services:
  qortium:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${QORTIUM_CONTAINER_NAME:-qortium-core}
    restart: unless-stopped
    ports:
      - "${QORTIUM_API_BIND_HOST:-127.0.0.1}:${QORTIUM_API_PORT:-12391}:${QORTIUM_API_PORT:-12391}"
      - "${QORTIUM_P2P_BIND_HOST:-0.0.0.0}:${QORTIUM_P2P_PORT:-12392}:${QORTIUM_P2P_PORT:-12392}"
      - "${QORTIUM_QDN_BIND_HOST:-0.0.0.0}:${QORTIUM_QDN_PORT:-12394}:${QORTIUM_QDN_PORT:-12394}"
    expose:
      - "${QORTIUM_API_PORT:-12391}"
      - "${QORTIUM_P2P_PORT:-12392}"
      - "${QORTIUM_QDN_PORT:-12394}"
    volumes:
      - ./data/qortium:/qortium
    networks:
      - qortium_net

networks:
  qortium_net:
    name: ${QORTIUM_NETWORK_NAME:-qortium-net}
    driver: bridge
