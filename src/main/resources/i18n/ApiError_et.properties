# Keys are from api.ApiError enum

# "localeLang": "et",

### Common ###
JSON = JSON-sõnumi parsimine ebaõnnestus

INSUFFICIENT_BALANCE = saldo pole piisav

UNAUTHORIZED = volitamata API-päring

REPOSITORY_ISSUE = andmehoidla viga

NON_PRODUCTION = see API-päring pole toodangusüsteemides lubatud

BLOCKCHAIN_NEEDS_SYNC = plokiahel peab esmalt sünkroonima

NO_TIME_SYNC = kella pole veel sünkroonitud

OPERATION_IN_PROGRESS = toiming on juba pooleli

### Validation ###
INVALID_SIGNATURE = vigane allkiri

INVALID_ADDRESS = vigane aadress

INVALID_PUBLIC_KEY = vigane avalik võti

INVALID_DATA = vigased andmed

INVALID_NETWORK_ADDRESS = vigane võrguaadress

ADDRESS_UNKNOWN = tundmatu konto aadress

INVALID_CRITERIA = vigased otsingukriteeriumid

INVALID_REFERENCE = vigane viide

TRANSFORMATION_ERROR = JSON-i ei õnnestunud tehinguks teisendada

INVALID_PRIVATE_KEY = vigane privaatvõti

INVALID_HEIGHT = vigane ploki kõrgus

CANNOT_MINT = konto ei saa mintida

### Blocks ###
BLOCK_UNKNOWN = tundmatu plokk

### Transactions ###
TRANSACTION_UNKNOWN = tundmatu tehing

PUBLIC_KEY_NOT_FOUND = avalikku võtit ei leitud

# this one is special in that caller expected to pass two additional strings, hence the two %s
TRANSACTION_INVALID = vigane tehing: %s (%s)

### Naming ###
NAME_UNKNOWN = tundmatu nimi


### Polls ###
POLL_NO_EXISTS = küsitlust pole olemas
### Asset ###
INVALID_ASSET_ID = vigane vara ID

INVALID_ORDER_ID = vigane vara tellimuse ID

ORDER_UNKNOWN = tundmatu vara tellimuse ID

### Groups ###
GROUP_UNKNOWN = tundmatu grupp

### Foreign Blockchain ###
FOREIGN_BLOCKCHAIN_NETWORK_ISSUE = välise plokiahela või ElectrumX-võrgu probleem

FOREIGN_BLOCKCHAIN_BALANCE_ISSUE = saldo pole välisel plokiahelal piisav

FOREIGN_BLOCKCHAIN_TOO_SOON = välise plokiahela tehingu edastamiseks on liiga vara (LockTime/ploki mediaanaeg)

### Trade Portal ###
ORDER_SIZE_TOO_SMALL = tellimuse summa on liiga väike

### Data ###
FILE_NOT_FOUND = faili ei leitud

NO_REPLY = partner ei vastanud lubatud aja jooksul

LITE_DATA_CONFLICT = partnerid tagastasid vastuolulisi andmeid
