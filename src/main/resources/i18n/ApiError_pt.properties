# Keys are from api.ApiError enum

# "localeLang": "pt",

### Common ###
JSON = falha ao analisar a mensagem JSON

INSUFFICIENT_BALANCE = saldo insuficiente

UNAUTHORIZED = chamada de API não autorizada

REPOSITORY_ISSUE = erro no repositório

NON_PRODUCTION = esta chamada de API não é permitida em sistemas de produção

BLOCKCHAIN_NEEDS_SYNC = a blockchain precisa sincronizar primeiro

NO_TIME_SYNC = o relógio ainda não foi sincronizado

OPERATION_IN_PROGRESS = operação já em andamento

### Validation ###
INVALID_SIGNATURE = assinatura inválida

INVALID_ADDRESS = endereço inválido

INVALID_PUBLIC_KEY = chave pública inválida

INVALID_DATA = dados inválidos

INVALID_NETWORK_ADDRESS = endereço de rede inválido

ADDRESS_UNKNOWN = endereço de conta desconhecido

INVALID_CRITERIA = critérios de busca inválidos

INVALID_REFERENCE = referência inválida

TRANSFORMATION_ERROR = não foi possível transformar o JSON em transação

INVALID_PRIVATE_KEY = chave privada inválida

INVALID_HEIGHT = altura de bloco inválida

CANNOT_MINT = a conta não pode cunhar

### Blocks ###
BLOCK_UNKNOWN = bloco desconhecido

### Transactions ###
TRANSACTION_UNKNOWN = transação desconhecida

PUBLIC_KEY_NOT_FOUND = chave pública não encontrada

# this one is special in that caller expected to pass two additional strings, hence the two %s
TRANSACTION_INVALID = transação inválida: %s (%s)

### Naming ###
NAME_UNKNOWN = nome desconhecido


### Polls ###
POLL_NO_EXISTS = a enquete não existe
### Asset ###
INVALID_ASSET_ID = ID de ativo inválido

INVALID_ORDER_ID = ID de ordem de ativo inválido

ORDER_UNKNOWN = ID de ordem de ativo desconhecido

### Groups ###
GROUP_UNKNOWN = grupo desconhecido

### Foreign Blockchain ###
FOREIGN_BLOCKCHAIN_NETWORK_ISSUE = problema na blockchain externa ou na rede ElectrumX

FOREIGN_BLOCKCHAIN_BALANCE_ISSUE = saldo insuficiente na blockchain externa

FOREIGN_BLOCKCHAIN_TOO_SOON = cedo demais para transmitir a transação da blockchain externa (LockTime/tempo mediano de bloco)

### Trade Portal ###
ORDER_SIZE_TOO_SMALL = valor da ordem baixo demais

### Data ###
FILE_NOT_FOUND = arquivo não encontrado

NO_REPLY = o par não respondeu dentro do tempo permitido

LITE_DATA_CONFLICT = os pares retornaram dados conflitantes
