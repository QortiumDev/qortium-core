# Keys are from api.ApiError enum

# "localeLang": "ar",

### Common ###
JSON = تعذر تحليل رسالة JSON

INSUFFICIENT_BALANCE = الرصيد غير كافٍ

UNAUTHORIZED = استدعاء API غير مصرح به

REPOSITORY_ISSUE = خطأ في المستودع

NON_PRODUCTION = استدعاء API هذا غير مسموح به على أنظمة الإنتاج

BLOCKCHAIN_NEEDS_SYNC = يجب أن تتم مزامنة سلسلة الكتل أولاً

NO_TIME_SYNC = لم تتم مزامنة الساعة بعد

OPERATION_IN_PROGRESS = العملية قيد التنفيذ بالفعل

### Validation ###
INVALID_SIGNATURE = توقيع غير صالح

INVALID_ADDRESS = عنوان غير صالح

INVALID_PUBLIC_KEY = مفتاح عام غير صالح

INVALID_DATA = بيانات غير صالحة

INVALID_NETWORK_ADDRESS = عنوان شبكة غير صالح

ADDRESS_UNKNOWN = عنوان الحساب غير معروف

INVALID_CRITERIA = معايير بحث غير صالحة

INVALID_REFERENCE = مرجع غير صالح

TRANSFORMATION_ERROR = تعذر تحويل JSON إلى معاملة

INVALID_PRIVATE_KEY = مفتاح خاص غير صالح

INVALID_HEIGHT = ارتفاع كتلة غير صالح

CANNOT_MINT = لا يمكن للحساب السكّ

### Blocks ###
BLOCK_UNKNOWN = كتلة غير معروفة

### Transactions ###
TRANSACTION_UNKNOWN = معاملة غير معروفة

PUBLIC_KEY_NOT_FOUND = المفتاح العام غير موجود

# this one is special in that caller expected to pass two additional strings, hence the two %s
TRANSACTION_INVALID = معاملة غير صالحة: %s (%s)

### Naming ###
NAME_UNKNOWN = اسم غير معروف


### Polls ###
POLL_NO_EXISTS = الاستطلاع غير موجود
### Asset ###
INVALID_ASSET_ID = معرّف أصل غير صالح

INVALID_ORDER_ID = معرّف أمر أصل غير صالح

ORDER_UNKNOWN = معرّف أمر أصل غير معروف

### Groups ###
GROUP_UNKNOWN = مجموعة غير معروفة

### Foreign Blockchain ###
FOREIGN_BLOCKCHAIN_NETWORK_ISSUE = مشكلة في سلسلة الكتل الأجنبية أو شبكة ElectrumX

FOREIGN_BLOCKCHAIN_BALANCE_ISSUE = الرصيد غير كافٍ على سلسلة الكتل الأجنبية

FOREIGN_BLOCKCHAIN_TOO_SOON = من المبكر جدًا بث معاملة سلسلة الكتل الأجنبية (LockTime/متوسط وقت الكتلة)

### Trade Portal ###
ORDER_SIZE_TOO_SMALL = مبلغ الأمر منخفض جدًا

### Data ###
FILE_NOT_FOUND = الملف غير موجود

NO_REPLY = لم يرد النظير خلال الوقت المسموح به

LITE_DATA_CONFLICT = أعاد النظراء بيانات متضاربة
