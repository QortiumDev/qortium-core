RESTART = إعادة التشغيل

BOOTSTRAP = تمهيد

BOOTSTRAP_CONFIRM = سيؤدي هذا إلى حذف قاعدة البيانات المحلية وتنزيل نسخة جديدة. هل تريد المتابعة؟
