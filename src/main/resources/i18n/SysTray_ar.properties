MINTING_ENABLED = ✔ السكّ

PERFORMING_DB_CHECKPOINT = جارٍ حفظ تغييرات قاعدة البيانات غير المثبتة...

PERFORMING_DB_MAINTENANCE = جارٍ تنفيذ الصيانة المجدولة...

SYNCHRONIZE_CLOCK = مزامنة الساعة

SYNCHRONIZING_BLOCKCHAIN = جارٍ المزامنة

SYNCHRONIZING_CLOCK = جارٍ مزامنة الساعة

