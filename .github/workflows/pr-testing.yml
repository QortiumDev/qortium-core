name: PR testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  mavenTesting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Cache local Maven repository
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', 'lib/**/*.pom', 'lib/**/*.jar') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Set up the Java JDK
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Load custom deps
      run: |
        mvn -B -U install -DskipTests=true --file pom.xml

    - name: Build package
      run: |
        mvn -B clean package --file pom.xml

    - name: Run API and translation regression tests
      run: |
        mvn -B test -DskipJUnitTests=false -Dtest=CorsFilterTests,TranslationsTests --file pom.xml
