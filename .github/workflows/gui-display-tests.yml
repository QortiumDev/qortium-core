name: GUI display tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guiDisplayTests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache local Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up the Java JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Load custom deps
        run: |
          mvn -B install -DskipTests=true --file pom.xml

      - name: Run GUI display tests
        run: |
          xvfb-run -a mvn -B test -DskipJUnitTests=false -Dqortium.runGuiDisplayTests=true -Dtest.awt.headless=false -Dtest=org.qortium.test.GuiTests --file pom.xml
