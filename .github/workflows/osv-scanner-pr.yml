name: OSV-Scanner PR Scan

on:
  pull_request:
    branches: [ main ]
  merge_group:
    branches: [ main ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache local Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-osv-${{ hashFiles('**/pom.xml', 'lib/**/*.pom', 'lib/**/*.jar') }}
          restore-keys: |
            ${{ runner.os }}-maven-osv-
            ${{ runner.os }}-maven-

      - name: Set up the Java JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Checkout target branch
        env:
          MERGE_GROUP_BASE_REF: ${{ github.event.merge_group.base_ref }}
        run: |
          base_ref="${GITHUB_BASE_REF:-${MERGE_GROUP_BASE_REF#refs/heads/}}"
          git checkout "${base_ref}"
          git submodule update --recursive

      - name: Generate old Maven dependency SBOM
        run: |
          mvn -B -U org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeBom \
            -DskipTests \
            -DoutputFormat=json \
            -DoutputName=bom.cdx \
            --file pom.xml
          cp target/bom.cdx.json old-bom.cdx.json

      - name: Run scanner on existing code
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --format=json
            --output=old-results.json
            -L old-bom.cdx.json
        continue-on-error: true

      - name: Checkout current branch
        run: |
          git checkout -f "${GITHUB_SHA}"
          git submodule update --recursive

      - name: Generate new Maven dependency SBOM
        run: |
          mvn -B -U org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeBom \
            -DskipTests \
            -DoutputFormat=json \
            -DoutputName=bom.cdx \
            --file pom.xml
          cp target/bom.cdx.json new-bom.cdx.json

      - name: Run scanner on new code
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --format=json
            --output=new-results.json
            -L new-bom.cdx.json
        continue-on-error: true

      - name: Run osv-scanner-reporter
        uses: google/osv-scanner-action/osv-reporter-action@v2.3.8
        with:
          scan-args: |-
            --output=results.sarif
            --old=old-results.json
            --new=new-results.json
            --gh-annotations=true
            --fail-on-vuln=true

      - name: Upload artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: OSV Scanner SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload old scan json results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: old-json-results
          path: old-results.json
          retention-days: 5

      - name: Upload new scan json results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: new-json-results
          path: new-results.json
          retention-days: 5

      - name: Upload to code-scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

      - name: Print Code Scanning PR URL
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        run: |
          echo "View the OSV-Scanner results for this PR in the Security tab:"
          echo "${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=pr%3A${{ github.event.pull_request.number }}"
